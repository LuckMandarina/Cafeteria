<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baristas</title>
    <link rel="stylesheet" href="Sign-in.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="Sign-in-body">
    <div class="go-back">
        <a href="/index.html">
            <i class="fa-solid fa-circle-xmark"></i>
        </a>
    </div>
    <header class="backbuttom">
        <h1>Inicia sesión</h1>
    </header>

    <div class="conteiner-sign-in">

        <div class="sign-in-header">
            <!-- Icono -->
            <i class="fa-solid fa-user"></i>
        </div>

        <div class="sign-in-form-section">

            <form class="contact-form" id="contact-form">

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingrese su Usuario" required>
                </div>

                <div class="form-group">
                    <label for="password" data-lang="es">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>

                </div>



                <button type="submit" class="btn-enviar" id="btn-enviar">Iniciar sesión</button>

            </form>

        </div>

        <div class="sign-in-with">
            <span class="sign-in-divider">or</span>
            <a href="#" class="google"><img src="/img/googleiconregisterlogin.png" alt="Google">
                <p>Inicia sesión con Google</p>
            </a>
        </div>
    </div>

    <div class="Sign-In">
        <p class="Redireccion">No tienes una cuenta? <a href="/Register.html" class="Sign-in-option">Registrate</a></p>
    </div>

    <script>
        // SOLO esto va aquí — es código del navegador
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault()
            const username = document.getElementById('username').value.trim()
            const password = document.getElementById('password').value

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })

            const data = await response.json()

            if (response.ok) {
                window.location.href = '/dashboard'
            } else {
                alert(data.error || 'Credenciales incorrectas')
            }
        })
    </script>
</body>

</html>
