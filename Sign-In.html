<!DOCTYPE html>
<html lang="en" >

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baristas</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="Sign-in-body">
    <header class="backbuttom">
        <div class="go-back">
            <a href="/index.html">
                <i class="fa-solid fa-circle-xmark"></i>
                <h1>Iniciar sesión</h1>
            </a>
        </div>
    </header>

    <div class="conteiner-sign-in">

        <div class="sign-in-header">
            <!-- Icono -->
        </div>

        <div class="sign-in-form-section">

            <form class="contact-form" id="contact-form">

                <div class="form-group">
                    <label for="nombre" data-lang="es">Nombre</label>
                    <label for="nombre" data-lang="en">Name</label>
                    <input type="text" id="nombre" name="name" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="email" data-lang="es">Correo electrónico</label>
                    <label for="email" data-lang="en">Email address</label>
                    <input type="email" id="email" name="email" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="mensaje" data-lang="es">Mensaje</label>
                    <label for="mensaje" data-lang="en">Message</label>
                    <textarea id="mensaje" name="message" rows="5" placeholder="" required></textarea>
                </div>

                <input type="text" name="_honeypot" style="display:none">

                <button type="submit" class="btn-enviar" id="btn-enviar">Enviar mensaje</button>

            </form>

        </div>

        <div class="sign-in-with">
            <span class="sign-in-divider">or</span>
            <a href="#" class="google"></a>
        </div>
    </div>

    <div class="register">
    </div>
</body>

</html>
